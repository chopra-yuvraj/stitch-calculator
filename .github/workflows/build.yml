name: 🔨 Build Flutter APK

# Triggers
on:
  push:
    branches:
      - main          # Runs automatically whenever you push to the main branch
  workflow_dispatch:  # Also lets you trigger a build manually from the GitHub UI

jobs:
  build-apk:
    name: Build Debug APK
    runs-on: ubuntu-latest   # GitHub provides a free Linux machine

    steps:

      # Step 1 ── Download your repository's code onto the build machine
      - name: ⬇️ Checkout code
        uses: actions/checkout@v4

      # Step 2 ── Java 17 is a hard requirement for Android's Gradle build system
      - name: ☕ Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      # Step 3 ── Download and install the latest stable Flutter SDK
      - name: 🐦 Set up Flutter (latest stable)
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true    # Caches Flutter between builds — saves ~3 minutes each run

      # Step 4 ── Your repo only has 4 files. Flutter needs dozens more
      #           (Gradle wrapper, Kotlin plugin, build configs, etc.)
      #           flutter create generates all of them without touching
      #           files that already exist.
      - name: 🏗️ Generate Flutter project scaffold
        run: flutter create --project-name stitch_calculator --org com.stitchapp .

      # Step 5 ── Safety net: flutter create may have overwritten pubspec.yaml,
      #           main.dart, or AndroidManifest.xml with generic versions.
      #           git checkout -- restores the exact files you committed.
      - name: 🔄 Restore custom source files
        run: >
          git checkout --
          pubspec.yaml
          lib/main.dart
          android/app/src/main/AndroidManifest.xml

      # Step 6 ── Download all packages declared in pubspec.yaml
      - name: 📦 Install Flutter packages
        run: flutter pub get

      # Step 7 ── Compile the APK
      #   --debug: produces a self-signed APK that can be sideloaded on
      #            any Android phone without a Play Store signing key.
      #            Perfect for personal/family apps.
      - name: 🔨 Build APK
        run: flutter build apk --debug

      # Step 8 ── Upload the APK as a downloadable artifact (kept for 30 days)
      - name: ⬆️ Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: Stitch-Calculator-APK
          path: build/app/outputs/flutter-apk/app-debug.apk
          retention-days: 30
          if-no-files-found: error   # Fail loudly if the APK was not created